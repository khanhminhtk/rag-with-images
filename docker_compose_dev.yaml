services:
  qdrant:
    image: qdrant/qdrant:v1.17-unprivileged
    container_name: qdrant_database
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage:z
    ports:
      - "6333:6333"
      - "6334:6334"