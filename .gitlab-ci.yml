variables:
    docker_file: docker_compose_dev.yaml
    folder_project: /home/gitlab-runner/projects/mrag
    process_name_test_llm: llm_service_test
    process_name_dev_llm: llm_service_dev

stages:
    - build
    - rebuild_docker
    - test
    - test_e2e
    - deploy
    - checklog

build:
    stage: build
    variables:
        GIT_STRATEGY: clone
    script: 
        - cp ~/envs/mrag/.env ./config/
        - cp -r ~/projects/mrag/model third_party/onnx_c++/
        - mkdir -p deploy/{bin,logs,third_party/onnx_c++}
        - cp -r config deploy/
        - cp -r third_party/onnx_c++/config/ deploy/third_party/onnx_c++/
        - cmake -S ./third_party/onnx_c++ -B ./third_party/onnx_c++/build -DCMAKE_BUILD_TYPE=Release -DOpenCV_DIR=/usr/lib/x86_64-linux-gnu/cmake/opencv4
        - cmake --build ./third_party/onnx_c++/build -j"$(nproc)"
        - go build -o deploy/bin/llm_service cmd/llm_service/main.go
        - go build -o deploy/bin/dlmodel_service cmd/dlmodel_service/main.go
        - go build -o deploy/bin/minio_service cmd/minio_service/main.go
        - go build -o deploy/bin/orchestrator_service cmd/orchestrator_service/main.go
        - go build -o deploy/bin/processfile_service cmd/processfile_service/main.go
        - go build -o deploy/bin/rag_service cmd/rag_service/main.go
        - ls -a deploy/bin/
    tags:
        - gpu_1650ti

rebuild_docker:
    stage: rebuild_docker
    variables:
        GIT_STRATEGY: none
    when: manual
    script:
        - ls -a
        - docker compose -f "$docker_file" down
        - docker compose -f "$docker_file" up -d
        - sudo chmod -R 755 $folder_project/data
        - sudo chown -R gitlab-runner:gitlab-runner $folder_project/data
        - docker ps -a
    tags:
        - gpu_1650ti

test_e2e:
    stage: test_e2e
    variables:
        GIT_STRATEGY: none
    need: ["build"]
    script:
        - nohup bash -c 'exec -a $process_name_test_llm ./deploy/bin/llm_service' > llm_stream_log.log 2>&1 & echo $! > $process_name_test_llm.pid
        - ./test_cases/llm_service_test_text_to_text.sh 
        - ./test_cases/llm_service_test_text_to_image.sh 
        -  kill -9 "$(ps -ef | grep '[l]lm_service_test' | awk '{print $2}')"
    tags:
        - gpu_1650ti

deploy:
    stage: deploy
    variables:
        GIT_STRATEGY: none
    need: ["test_e2e"]
    script:
        - cp -r deploy $folder_project
        - kill -9 "$(ps -ef | grep '[l]lm_service_dev' | awk '{print $2}')"
        - nohup bash -c 'exec -a $process_name_dev_llm ./deploy/bin/llm_service' > llm_stream_log.log 2>&1 & echo $! > $process_name_dev_llm.pid
        - ps -ef | grep '[l]lm_service_dev' | awk '{print $2}'
    when: manual


