qdrant:
    bootstrap: "localhost"
    port: "${QDRANT_GRPC_PORT}"
    use_gRPC: false
    log_path: "/home/minhtk/code/rag_imtotext_texttoim/worktree/service-rag/logs/qdrant.log"
llm_service:
    model: "${LLM_MODEL}"
    temp: ${LLM_TEMPERATURE}
    apikey: "${GEMINI_API_KEY}"
    port: "${LLM_SERVICE_PORT}"
minio_service:
    endpoint: "localhost:9000"
    access_key: "admin"
    secret_key: "supersecretpassword"
    use_ssl: false
    default_bucket: "${MINIO_DEFAULT_BUCKET}"
    buckets:
        default: "${MINIO_DEFAULT_BUCKET}"
        upload: "${MINIO_BUCKET_UPLOAD}"
        presign: "${MINIO_BUCKET_PRESIGN}"
        delete: "${MINIO_BUCKET_DELETE}"
        archive: "${MINIO_BUCKET_ARCHIVE}"
    region: "${MINIO_REGION}"
    presign_expiry_seconds: 900
    grpc_port: "${MINIO_SERVICE_PORT}"
    topics:
        upload_request: "${MINIO_KAFKA_UPLOAD_TOPIC}"
        upload_group: "${MINIO_KAFKA_UPLOAD_GROUP}"
        upload_result: "${MINIO_KAFKA_RESULT_TOPIC}"
kafka:
    brokers: ["${KAFKA_BROKERS}"]
embedding_service:
    port: "${EMBEDDING_SERVICE_PORT}"
    log_path: "${EMBEDDING_SERVICE_LOG_PATH}"
    jina_config_path: "${EMBEDDING_SERVICE_JINA_CONFIG}"
    topics:
        batch_text_request: "${EMBEDDING_SERVICE_KAFKA_BATCH_TEXT_TOPIC}"
        batch_text_group: "${EMBEDDING_SERVICE_KAFKA_BATCH_TEXT_GROUP}"
        batch_text_result: "${EMBEDDING_SERVICE_KAFKA_BATCH_TEXT_RESULT_TOPIC}"
        batch_image_request: "${EMBEDDING_SERVICE_KAFKA_BATCH_IMAGE_TOPIC}"
        batch_image_group: "${EMBEDDING_SERVICE_KAFKA_BATCH_IMAGE_GROUP}"
        batch_image_result: "${EMBEDDING_SERVICE_KAFKA_BATCH_IMAGE_RESULT_TOPIC}"
process_file_service:
    port: "${PROCESS_FILE_SERVICE_PORT}"
    log_path: "${PROCESS_FILE_SERVICE_LOG_PATH}"
    path_download: "${PROCESS_FILE_SERVICE_PATH_DOWNLOAD}"
    batch_size: 20
    marker_dev_mode: false
    topics:
        process_file_request: "${PROCESS_FILE_SERVICE_KAFKA_PROCESS_FILE_REQUEST_TOPIC}"
        process_file_group: "${PROCESS_FILE_SERVICE_KAFKA_PROCESS_FILE_GROUP}"
        process_file_result: "${PROCESS_FILE_SERVICE_KAFKA_PROCESS_FILE_RESULT_TOPIC}"
rag_service:
    port: "${RAG_SERVICE_PORT}"
    log_path: "${RAG_SERVICE_LOG_PATH}"
    qdrant_host: "${RAG_QDRANT_HOST}"
    qdrant_port: "${RAG_QDRANT_PORT}"
    qdrant_use_gRPC: ${RAG_QDRANT_USE_GRPC}
orchestrator_service:
    port: "${ORCHESTRATOR_SERVICE_PORT}"
    log_path: "${ORCHESTRATOR_SERVICE_LOG_PATH}"
    session_ttl_seconds: 1800
    pre_processing:
        model: ""
        temperature: 0
