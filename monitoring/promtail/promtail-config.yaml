server:
  http_listen_port: ${PROMTAIL_HTTP_LISTEN_PORT}
  grpc_listen_port: 0
positions:
  filename: ${PROMTAIL_POSITIONS_FILE}
clients:
  - url: ${PROMTAIL_PUSH_URL}
scrape_configs:
  - job_name: ${PROMTAIL_JOB_NAME}
    static_configs:
      - labels:
          app: ${PROMTAIL_SERVICE_NAME}
          env: ${APP_ENV}
          __path__: ${PROMTAIL_LOG_PATH}
    pipeline_stages:
      - json:
          expressions:
            level: level
      - regex:
          source: filename
          expression: '.*/(?P<service_name>[a-zA-Z0-9_-]+)\.log$'
      - labels:
          service_name:
          level:
